version: "3.9"

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vf-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vf-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vf-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      SQL_HOST: sqlserver
      MONGO_URI: mongodb://mongo:27017/vamshi_products
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      FRONTEND_URL: http://localhost:80
    depends_on:
      - sqlserver
      - mongo
      - rabbitmq
    networks:
      - vf-network
    restart: on-failure

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vf-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "VamshiFitness@123"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - vf-network
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: vf-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - vf-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vf-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - vf-network
    restart: unless-stopped

volumes:
  sqlserver_data:
  mongo_data:
  rabbitmq_data:

networks:
  vf-network:
    driver: bridge
