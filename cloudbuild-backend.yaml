# cloudbuild-backend.yaml — Build & push with latest tag
steps:
  # Step 1 — Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.backend'
      - '-t'
      - 'asia-south1-docker.pkg.dev/project-2c498aad-1833-4bd5-bec/capstone-demo-artifact/vf-backend:$BUILD_ID'
      - '-t'
      - 'asia-south1-docker.pkg.dev/project-2c498aad-1833-4bd5-bec/capstone-demo-artifact/vf-backend:latest'
      - '.'
  # Step 2 — Push BUILD_ID tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/project-2c498aad-1833-4bd5-bec/capstone-demo-artifact/vf-backend:$BUILD_ID'
  # Step 3 — Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/project-2c498aad-1833-4bd5-bec/capstone-demo-artifact/vf-backend:latest'
images:
  - 'asia-south1-docker.pkg.dev/project-2c498aad-1833-4bd5-bec/capstone-demo-artifact/vf-backend:$BUILD_ID'
  - 'asia-south1-docker.pkg.dev/project-2c498aad-1833-4bd5-bec/capstone-demo-artifact/vf-backend:latest'
options:
  logging: CLOUD_LOGGING_ONLY
